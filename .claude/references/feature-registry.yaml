- name: pretool-oracle-gate-py
  philosophy: ['#6', '#4']
  type: gate
  category: quality
  description: Oracle 审查前置门禁 (Python 版) — 编辑机制/治理文件前检查 Oracle/Meta-Oracle ACCEPT 裁决
