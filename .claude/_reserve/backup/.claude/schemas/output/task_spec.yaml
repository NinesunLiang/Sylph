# task_spec.yaml
# Schema: 任务规约输出契约
# Referenced by: lx-task-spec
# 用途：标准化任务规约的输出格式，确保每个任务有可验收的 AC 和影响范围声明
version: "1.0"
fields:
  task_id:
    type: string
    description: "任务 ID"
    required: true
  title:
    type: string
    description: "任务标题"
    required: true
  description:
    type: string
    description: "任务描述"
    required: true
  acceptance_criteria:
    type: array
    description: "验收标准列表"
    items:
      type: object
      properties:
        id:
          type: string
          pattern: "AC-\\d{3}"
          description: "验收标准 ID"
          required: true
        description:
          type: string
          description: "验收标准描述"
          required: true
        verification_method:
          type: string
          enum: [test, manual_review, auto_check]
          description: "验证方式"
          required: true
        confidence:
          type: string
          enum: [confirmed, likely, needs_review]
          description: "AC 准确度置信度 — E2 幻觉守卫"
          default: confirmed
  scope:
    type: object
    description: "任务范围声明"
    properties:
      in_scope:
        type: array
        items:
          type: string
        description: "范围内事项"
      out_of_scope:
        type: array
        items:
          type: string
        description: "非范围事项（明确不做的）"
  dependencies:
    type: array
    description: "前置依赖"
    items:
      type: string
  estimated_impact:
    type: object
    properties:
      files:
        type: array
        description: "预计影响的文件列表"
        items:
          type: string
      risk:
        type: string
        enum: [low, medium, high]
        description: "变更风险等级"
        required: true
