# OMA Skill 统一错误码 Schema
# 所有 lx-oma-* skill 共享此错误码体系
# 格式: ERR-{SKILL_PREFIX}-{CATEGORY}{SEQUENCE}

# Skill 前缀:
#   HIER  → lx-oma-hier
#   SPLIT → lx-oma-split
#   GOV   → lx-oma-gov
#   ORCH  → lx-oma-orch

# 类别:
#   00-09: 输入/参数错误
#   10-19: 文件/IO 错误
#   20-29: 业务逻辑错误
#   30-39: 超时/重试错误
#   90-99: 系统/未知错误

error_codes:
  # 输入/参数错误 (00-09)
  ERR_PARAM_MISSING:
    pattern: "ERR-{SKILL}-01"
    description: "缺少必要参数"
    severity: BLOCKER
    action: "检查入参是否完整，参照 SKILL.md 的 argument-hint"

  ERR_PARAM_INVALID:
    pattern: "ERR-{SKILL}-02"
    description: "参数格式或值不合法"
    severity: BLOCKER
    action: "检查入参是否符合预期格式"

  ERR_PATH_NOT_FOUND:
    pattern: "ERR-{SKILL}-03"
    description: "输入路径不存在"
    severity: BLOCKER
    action: "确认路径存在后重试"

  # 文件/IO 错误 (10-19)
  ERR_FILE_READ:
    pattern: "ERR-{SKILL}-10"
    description: "文件读取失败（权限/编码/不存在）"
    severity: BLOCKER
    action: "检查文件权限和编码，尝试降级编码后重试"

  ERR_FILE_WRITE:
    pattern: "ERR-{SKILL}-11"
    description: "文件写入失败"
    severity: BLOCKER
    action: "检查磁盘空间和写入权限后重试"

  ERR_YAML_PARSE:
    pattern: "ERR-{SKILL}-12"
    description: "YAML 解析失败"
    severity: BLOCKER
    action: "检查 pipeline.yaml 格式是否正确"

  # 业务逻辑错误 (20-29)
  ERR_STAGE_CONFLICT:
    pattern: "ERR-{SKILL}-20"
    description: "当前阶段不允许此操作"
    severity: BLOCKER
    action: "检查 pipeline.yaml stages 状态，确认正确阶段再操作"

  ERR_GATE_BLOCKED:
    pattern: "ERR-{SKILL}-21"
    description: "Oracle gate 未通过，阶段推进受阻"
    severity: BLOCKER
    action: "运行 /lx-oma-orch gate <og-id> approve|reject 裁决后重试"

  ERR_DUPLICATE_ID:
    pattern: "ERR-{SKILL}-22"
    description: "实体 ID 重复（feature/sub_prd/gate）"
    severity: WARNING
    action: "检查 pipeline.yaml 或 feature-map.md 中是否有重复 ID"

  ERR_VALIDATION_FAILED:
    pattern: "ERR-{SKILL}-23"
    description: "MECE 正交性校验失败或接口归属校验失败"
    severity: BLOCKER
    action: "修复未归属接口/重复职责后重试"

  # 超时/重试错误 (30-39)
  ERR_TIMEOUT:
    pattern: "ERR-{SKILL}-30"
    description: "操作超时"
    severity: WARNING
    action: "检查操作是否正常执行中，确认无死锁后重试"

  ERR_RETRY_EXCEEDED:
    pattern: "ERR-{SKILL}-31"
    description: "超过最大重试次数（默认 3 次）"
    severity: BLOCKER
    action: "停止重试，向用户报告已尝试方案 + 失败证据"

  ERR_LOCK_CONTENTION:
    pattern: "ERR-{SKILL}-32"
    description: "OMA 文件锁竞争（多终端并发写入冲突）"
    severity: WARNING
    action: "等待锁释放后重试，或检查锁文件是否过期"

  # 系统/未知错误 (90-99)
  ERR_SKILL_UNAVAILABLE:
    pattern: "ERR-{SKILL}-90"
    description: "依赖的子 skill 不存在或不可用"
    severity: BLOCKER
    action: "检查子 skill 是否已安装，参照降级策略执行"

  ERR_UNKNOWN:
    pattern: "ERR-{SKILL}-99"
    description: "未预期的错误"
    severity: BLOCKER
    action: "收集错误信息后向用户报告"
