# Carror OS Feature Registry
# 统一特性目录，hooks + skills 全部可切换
# Generated: 2026-05-04

version: 1

hooks:
  - name: permission-gate
    type: gate
    category: security
    description: 危险命令拦截 (rm -rf, DROP TABLE, git push --force)
    enabled_by_default: true
    evidence_level: L3
  - name: privacy-gate
    type: gate
    category: security
    description: 敏感文件/DLP 保护，防止 .env/私钥泄露
    enabled_by_default: true
    evidence_level: L3
  - name: subagent-guard
    type: gate
    category: security
    description: 子代理类型安全门禁，限制 executor/designer/scientist
    enabled_by_default: true
    evidence_level: L3
  - name: preTool-edit-scope
    type: guard
    category: quality
    description: 编辑范围预检，防止修改非目标文件
    enabled_by_default: true
    evidence_level: L3
  - name: edit-guard
    type: guard
    category: quality
    description: 编辑内容质量门禁，拦截空/越界编辑
    enabled_by_default: true
    evidence_level: L3
  - name: lsp-suggest
    type: monitor
    category: observability
    description: LSP 诊断建议注入
    enabled_by_default: true
    evidence_level: L3
  - name: postTool-read-cite
    type: monitor
    category: audit
    description: 读取后引用标注
    enabled_by_default: false
    evidence_level: L3
  - name: postTool-bash-audit
    type: audit
    category: audit
    description: bash 命令审计日志
    enabled_by_default: true
    evidence_level: L3
  - name: postTool-write-cite
    type: monitor
    category: audit
    description: 写入后引用标注
    enabled_by_default: true
    evidence_level: L3
  - name: auto-snapshot
    type: monitor
    category: knowledge
    description: 自动会话快照（根据 turn 间隔）
    enabled_by_default: true
    evidence_level: L3
  - name: postTool-edit-quality
    type: guard
    category: quality
    description: 编辑后质量检查
    enabled_by_default: true
    evidence_level: L3
  - name: inject-project-knowledge
    type: injector
    category: knowledge
    description: 会话启动时注入 kernel.md / claude-next.md / anti-patterns.md
    enabled_by_default: true
    evidence_level: L3
  - name: plan-gate
    type: gate
    category: delivery
    description: 非琐碎任务强制 planning
    enabled_by_default: false
    evidence_level: L3
  - name: turn-counter
    type: monitor
    category: observability
    description: 轮次计数器，控制 todo 刷新间隔
    enabled_by_default: true
    evidence_level: L3
  - name: read-tracker
    type: monitor
    category: observability
    description: 读取跟踪，记录已读取文件
    enabled_by_default: true
    evidence_level: L3
  - name: error-dna
    type: monitor
    category: observability
    description: 错误 DNA 分析，跟踪错误模式
    enabled_by_default: true
    evidence_level: L3
  - name: skill-flywheel
    type: monitor
    category: runtime
    description: Skill 飞轮，技能使用统计和优化建议
    enabled_by_default: true
    evidence_level: L3
  - name: build-validator
    type: gate
    category: quality
    description: 编译验证门禁，自动检查构建状态
    enabled_by_default: true
    evidence_level: L3
  - name: pretool-user-correction
    type: monitor
    category: quality
    description: 用户纠正检测，触发纠正学习
    enabled_by_default: true
    evidence_level: L3
  - name: pretool-rule-anchor
    type: monitor
    category: knowledge
    description: 规则锚点，turn 间隔注入防漂移提醒
    enabled_by_default: true
    evidence_level: L3
  - name: proactive-handoff
    type: gate
    category: delivery
    description: 主动交接，长会话自动总结并建议重置
    enabled_by_default: false
    evidence_level: L3
  - name: completion-gate
    type: gate
    category: delivery
    description: 假完成拦截，要求 VERIFIED 证据
    enabled_by_default: true
    evidence_level: L3
  - name: context-guard
    type: gate
    category: runtime
    description: 上下文守卫，50% 甜点区警告 + 80% 硬阻断写/执行操作
    enabled_by_default: true
    evidence_level: L3
  - name: pretool-write-lock
    type: gate
    category: audit
    description: 写入前锁定检查，防止并发写入冲突
    enabled_by_default: true
    evidence_level: L3
  - name: posttool-write-lock
    type: gate
    category: audit
    description: 写入后锁定释放，清理锁定状态
    enabled_by_default: true
    evidence_level: L3
  - name: flywheel-report
    type: monitor
    category: runtime
    description: 飞轮报告生成，输出技能使用统计
    enabled_by_default: true
    evidence_level: L3
  - name: feature-probe
    type: monitor
    category: observability
    description: 特性探针，验证 feature 的 L1-L4 证据链
    enabled_by_default: true
    evidence_level: L3
  - name: harness_config
    type: shared
    category: utility
    description: 共享配置读取器，所有 hook source 的工具库
    enabled_by_default: true
    evidence_level: L3
  - name: token_writer
    type: monitor
    category: observability
    description: 写入 token 追踪索引，由 context-guard 调用
    enabled_by_default: true
    evidence_level: L3
  - name: pretool-write-lock
    type: gate
    category: runtime
    description: OMA 写锁前置门禁，多 Agent 写同一文件时排队互斥
    enabled_by_default: true
    evidence_level: L3
  - name: posttool-write-lock
    type: gate
    category: runtime
    description: OMA 写锁释放，完成写入后释放文件锁
    enabled_by_default: true
    evidence_level: L3

skills:
  - name: lx-status
    type: monitor
    category: observability
    description: 健康面板：执行效率、自愈力和渐进式披露 Token 节省
    enabled_by_default: true
  - name: lx-code-review
    type: reviewer
    category: review
    description: Go 代码审查：8 类别 39 规则，含错误处理/并发/接口/性能
    enabled_by_default: true
  - name: lx-react-review
    type: reviewer
    category: review
    description: React/Next.js 前端代码审查：渲染性能/Hooks/组件/状态/TS质量
    enabled_by_default: true
  - name: lx-style-guide
    type: reviewer
    category: review
    description: Tailwind CSS 规范 + Design Token 一致性 + 响应式断点验证
    enabled_by_default: true
  - name: lx-web-perf
    type: reviewer
    category: review
    description: Web 性能审查：Bundle 分析/Web Vitals/Next.js 优化/渲染/网络/资产
    enabled_by_default: true
  - name: lx-browser-verify
    type: tester
    category: test
    description: 浏览器可视化验收：多分辨率截图/视觉回归/交互流/跨浏览器
    enabled_by_default: true
  - name: lx-golang-test
    type: tester
    category: test
    description: Go 测试代码生成：table-driven/mocks/HTTP handlers/benchmarks/fuzz
    enabled_by_default: true
  - name: lx-perf-analysis
    type: tester
    category: test
    description: Go 性能分析：CPU/内存 profiling/goroutine 泄漏/benchmark
    enabled_by_default: true
  - name: lx-frontend-test
    type: tester
    category: test
    description: 前端测试模板：系统化调试报告输出
    enabled_by_default: true
  - name: lx-security-review
    type: reviewer
    category: security
    description: 安全扫描：Go 代码 + 依赖漏洞扫描/自动修复/提交判定
    enabled_by_default: true
  - name: lx-varlock
    type: guard
    category: security
    description: 隐私脱敏代理管理器：密码/API Key/Token 明文保护
    enabled_by_default: true
  - name: lx-todo
    type: workflow
    category: workflow
    description: 轻量 TODO 工作流：capture/triage/fix/verify/close 5步循环
    enabled_by_default: true
  - name: lx-task-spec
    type: workflow
    category: workflow
    description: 任务驱动机制：引导问答 x3 → 结构化输入 → 规划 → 执行 → 验收
    enabled_by_default: true
  - name: lx-tdd-spec
    type: workflow
    category: workflow
    description: 可测试规格生成：行为矩阵 + GWT 验收标准
    enabled_by_default: true
  - name: lx-debug-spec
    type: workflow
    category: workflow
    description: 调试规格：根因调查 → 假设验证 → 修复 → 回归测试
    enabled_by_default: true
  - name: lx-pre-commit
    type: gate
    category: workflow
    description: 提交前质量门禁：类型检测 → 编译 → 测试 → 代码审查
    enabled_by_default: true
  - name: lx-pre-push
    type: gate
    category: workflow
    description: 推送前深度门禁：commit message 校验 → 测试覆盖 → 安全扫描
    enabled_by_default: true
  - name: lx-rpe
    type: workflow
    category: workflow
    description: RPE 特性开发循环：TDD/代码审查/安全/验收/分级回滚
    enabled_by_default: true
  - name: lx-prd
    type: workflow
    category: workflow
    description: PRD 生产流水线：Discovery → Draft → Self-Eval → Expert Review → Polish
    enabled_by_default: true
  - name: lx-validate-skill
    type: reviewer
    category: quality
    description: Skill 验收：frontmatter/原子化声明/节点引用/11 项规则检查
    enabled_by_default: true
  - name: lx-root-cause-analysis
    type: analyzer
    category: debug
    description: 根因分析：Five Whys/证据链/置信度评分/免疫防御
    enabled_by_default: true
  - name: lx-oma
    type: orchestrator
    category: workflow
    description: 一人成军司令部：需求拆解为正交功能分支，支持目录/单文件输入
    enabled_by_default: true
  - name: lx-race
    type: orchestrator
    category: workflow
    description: "蜂群协调层：注册子任务 → 派发 → 收集 → 报告。复用 team/OMA Lock/race_manager.sh"
    enabled_by_default: true
