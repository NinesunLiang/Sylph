version: 1
hooks:
- name: permission-gate
  type: gate
  category: security
  description: 危险命令拦截 (rm -rf, DROP TABLE, git push --force)
  enabled_by_default: true
  evidence_level: L3
- name: privacy-gate
  type: gate
  category: security
  description: 敏感文件/DLP 保护，防止 .env/私钥泄露
  enabled_by_default: true
  evidence_level: L3
- name: subagent-guard
  type: gate
  category: security
  description: 子代理类型安全门禁，限制 executor/designer/scientist
  enabled_by_default: true
  evidence_level: L3
- name: pretool-edit-scope
  type: guard
  category: quality
  description: 编辑范围预检，防止修改非目标文件
  enabled_by_default: true
  evidence_level: L3
- name: edit-guard
  type: guard
  category: quality
  description: 编辑内容质量门禁，拦截空/越界编辑
  enabled_by_default: true
  evidence_level: L3
- name: lsp-suggest
  type: monitor
  category: observability
  description: LSP 诊断建议注入
  enabled_by_default: true
  evidence_level: L3
- name: posttool-read-cite
  type: monitor
  category: audit
  description: 读取后引用标注
  enabled_by_default: false
  evidence_level: L3
- name: posttool-bash-audit
  type: audit
  category: audit
  description: bash 命令审计日志
  enabled_by_default: true
  evidence_level: L3
- name: posttool-write-cite
  type: monitor
  category: audit
  description: 写入后引用标注
  enabled_by_default: true
  evidence_level: L3
- name: auto-snapshot
  type: monitor
  category: knowledge
  description: 自动会话快照（根据 turn 间隔）
  enabled_by_default: true
  evidence_level: L3
- name: posttool-edit-quality
  type: guard
  category: quality
  description: 编辑后质量检查
  enabled_by_default: true
  evidence_level: L3
- name: inject-project-knowledge
  type: injector
  category: knowledge
  description: 会话启动时注入 kernel.md / claude-next.md / anti-patterns.md
  enabled_by_default: true
  evidence_level: L3
- name: plan-gate
  type: gate
  category: delivery
  description: 非琐碎任务强制 planning
  enabled_by_default: false
  evidence_level: L3
- name: turn-counter
  type: monitor
  category: observability
  description: 轮次计数器，控制 todo 刷新间隔
  enabled_by_default: true
  evidence_level: L3
- name: read-tracker
  type: monitor
  category: observability
  description: 读取跟踪，记录已读取文件
  enabled_by_default: true
  evidence_level: L3
- name: error-dna
  type: monitor
  category: observability
  description: 错误 DNA 分析，跟踪错误模式
  enabled_by_default: true
  evidence_level: L3
- name: skill-flywheel
  type: monitor
  category: runtime
  description: Skill 飞轮，技能使用统计和优化建议
  enabled_by_default: true
  evidence_level: L3
- name: build-validator
  type: gate
  category: quality
  description: 编译验证门禁，自动检查构建状态
  enabled_by_default: true
  evidence_level: L3
- name: pretool-user-correction
  type: monitor
  category: quality
  description: 用户纠正检测，触发纠正学习
  enabled_by_default: true
  evidence_level: L3
- name: proactive-handoff
  type: gate
  category: delivery
  description: 主动交接，长会话自动总结并建议重置
  enabled_by_default: false
  evidence_level: L3
- name: completion-gate
  type: gate
  category: delivery
  description: 假完成拦截，要求 VERIFIED 证据
  enabled_by_default: true
  evidence_level: L3
- name: context-guard
  type: gate
  category: runtime
  description: 上下文守卫，50% 甜点区警告 + 80% 硬阻断写/执行操作
  enabled_by_default: true
  evidence_level: L3
- name: pretool-write-lock
  type: gate
  category: audit
  description: 写入前锁定检查，防止并发写入冲突
  enabled_by_default: true
  evidence_level: L3
- name: posttool-write-lock
  type: gate
  category: audit
  description: 写入后锁定释放，清理锁定状态
  enabled_by_default: true
  evidence_level: L3
- name: flywheel-report
  type: monitor
  category: runtime
  description: 飞轮报告生成，输出技能使用统计
  enabled_by_default: true
  evidence_level: L3
- name: feature-probe
  type: monitor
  category: observability
  description: 特性探针，验证 feature 的 L1-L4 证据链
  enabled_by_default: true
  evidence_level: L3
- name: harness_config
  type: shared
  category: utility
  description: 共享配置读取器，所有 hook source 的工具库
  enabled_by_default: true
  evidence_level: L3
- name: token_writer
  type: monitor
  category: observability
  description: 写入 token 追踪索引，由 context-guard 调用
  enabled_by_default: true
  evidence_level: L3
- name: pretool-write-lock
  type: gate
  category: runtime
  description: OMA 写锁前置门禁，多 Agent 写同一文件时排队互斥
  enabled_by_default: true
  evidence_level: L3
- name: posttool-write-lock
  type: gate
  category: runtime
  description: OMA 写锁释放，完成写入后释放文件锁
  enabled_by_default: true
  evidence_level: L3
- name: compact-detect
  type: monitor
  category: observability
  description: 上下文压缩检测 + 知识注入
  enabled_by_default: true
  evidence_level: L3
- name: error-dna-auto-fix
  type: monitor
  category: self-heal
  description: Error DNA 自动修复引擎
  enabled_by_default: true
  evidence_level: L3
- name: fuzzy-block
  type: gate
  category: quality
  description: 模糊指令阻断门禁
  enabled_by_default: true
  evidence_level: L3
- name: intent-tracker
  type: monitor
  category: observability
  description: 意图追踪与矛盾检测
  enabled_by_default: true
  evidence_level: L3
- name: knowledge-condenser
  type: monitor
  category: knowledge
  description: 会话知识压缩与升华
  enabled_by_default: true
  evidence_level: L3
- name: posttool-claim-audit
  type: guard
  category: audit
  description: 输出断言真实性校验
  enabled_by_default: true
  evidence_level: L3
- name: posttool-completion-audit
  type: audit
  category: quality
  description: 完成声明独立审计
  enabled_by_default: true
  evidence_level: L3
- name: posttool-handoff-writer
  type: monitor
  category: audit
  description: 会话交接记录写入
  enabled_by_default: true
  evidence_level: L3
- name: posttool-subagent-audit
  type: audit
  category: audit
  description: 子代理使用审计
  enabled_by_default: true
  evidence_level: L3
- name: pre-completion-gate
  type: gate
  category: delivery
  description: 完成前门禁预检
  enabled_by_default: true
  evidence_level: L3
- name: pretool-retry-check
  type: gate
  category: quality
  description: 重试预算检查
  enabled_by_default: true
  evidence_level: L3
- name: stop-drain
  type: monitor
  category: runtime
  description: Stop hook 兜底重放
  enabled_by_default: true
  evidence_level: L3
skills:
- name: lx-code-review
  type: reviewer
  category: review
  description: Go 代码审查：8 类别 39 规则，含错误处理/并发/接口/性能
  enabled_by_default: true
- name: lx-react-review
  type: reviewer
  category: review
  description: React/Next.js 前端代码审查：渲染性能/Hooks/组件/状态/TS质量
  enabled_by_default: true
- name: lx-web-perf
  type: reviewer
  category: review
  description: Web 性能审查：Bundle 分析/Web Vitals/Next.js 优化/渲染/网络/资产
  enabled_by_default: true
- name: lx-security-review
  type: reviewer
  category: security
  description: 安全扫描：Go 代码 + 依赖漏洞扫描/自动修复/提交判定
  enabled_by_default: true
- name: lx-pre-commit
  type: gate
  category: workflow
  description: 提交前质量门禁：类型检测 → 编译 → 测试 → 代码审查
  enabled_by_default: true
- name: lx-pre-push
  type: gate
  category: workflow
  description: 推送前深度门禁：commit message 校验 → 测试覆盖 → 安全扫描
  enabled_by_default: true
- name: lx-oma-split
  type: orchestrator
  category: workflow
  description: 一人成军拆解大脑：将 Sub PRD 拆解为正交 Feature
  enabled_by_default: true
- name: lx-oma-hier
  type: orchestrator
  category: workflow
  description: 分层 PRD 拆解：将主 PRD 按功能域 MECE 拆分为 Sub PRD
  enabled_by_default: true
- name: lx-oma-gov
  type: orchestrator
  category: workflow
  description: OMA PRD 治理：reconcile/propagate/audit 漂移检测
  enabled_by_default: true
- name: lx-oma-orch
  type: orchestrator
  category: workflow
  description: Pipeline Orchestrator：管线编排与 Oracle 门禁裁决
  enabled_by_default: true
- name: lx-varlock
  type: gate
  category: security
  description: 隐私脱敏代理管理器：敏感信息（密码/API Key/Token）脱敏读写与代理执行
  enabled_by_default: true
