# skill-dependencies.yaml — 技能依赖图声明
# 用途：显式声明各 skill 之间的依赖关系和管线流向，防止隐式循环
# 维护者：Carror OS
# 版本：v2.0.0 — OMA 四合一合并
#
# 变更记录:
#   v2.0.0: lx-oma-hier + lx-oma-split + lx-oma-gov + lx-oma-orch → lx-oma (subcommand dispatch)
#   v1.0.0: 初始版本

# ─── 管线阶段（严格有序） ───
# 每个阶段依赖上一阶段的输出
pipeline:
  stages:
    - id: hier
      name: 分层拆解
      skill: lx-oma
      subcommand: hier
      input: master-prd.md / 大型 PRD 目录
      output: sub-prds/domain-{id}.md
      gate: og-001 (hier→oma)
    - id: split
      name: 特性拆解
      skill: lx-oma
      subcommand: split
      input: sub-prds/domain-{id}.md
      output: prd/{sub_prd}/feat-{id}/prd.md
      gate: og-002 (oma→gov)
    - id: gov
      name: 治理初始化
      skill: lx-oma
      subcommand: gov
      input: master-prd.md + prd/{sub_prd}/feat-{id}/
      output: .omc/state/gov-latest-report.yaml
      gate: og-00N (gov→rpe)
    - id: rpe
      name: 特性开发
      skill: lx-rpe
      input: prd/{sub_prd}/feat-{id}/prd.md
      output: rpe/{feature}/ (implementation)
      gate: og-00N (rpe→dev)
    - id: dev
      name: 研发执行
      skill: (multi-agent / lx-race)
      input: rpe/{feature}/plan.md
      output: 代码变更
      gate: none (terminal stage)

# ─── 技能依赖声明 ───
# provides: 该 skill 产出的工件
# consumes: 该 skill 消耗的工件/其他 skill 的产出
# references: 该 skill 引用（import/read）的其他 skill 的 SKILL.md
# orchestrator: 该 skill 被哪个编排器协调
skills:
  - id: lx-oma
    version: v2.0.0
    type: pipeline
    subcommands:
      - hier     # L1 分层拆解（原 lx-oma-hier v1.3.2）
      - split    # L2 特性拆解（原 lx-oma-split v1.2.1）
      - gov      # PRD 治理（原 lx-oma-gov v1.2.1）
      - orch     # 管线编排（原 lx-oma-orch v1.2.2）
    consumes:
      hier: [master_prd]
      split: [sub_prd_domains]
      gov: [master_prd, feature_prds]
      orch: [pipeline_state]
    provides:
      hier: [sub_prd_domains]
      split: [feature_prds]
      gov: [gov_report]
      orch: [pipeline_advancement, gate_decisions]
    orchestrates:
      - lx-oma (hier → split → gov → orch, internal routing)
      - lx-rpe
    description: "OMA Pipeline — hierarchically decompose, split into features, govern, orchestrate (subcommand: hier|split|gov|orch)"

  - id: lx-rpe
    version: v4.0.0
    type: implementation
    consumes: [feature_prds]
    provides: [implementation, test_evidence]
    references:
      - lx-oma    # 治理路径从 gov 接收变更通知
    orchestrator: lx-oma
    description: RPE 系统性开发模式 — 9 步开发闭环

  - id: lx-race
    version: v1.0.0
    type: coordination
    consumes: [task_queue]
    provides: [parallel_execution, conflict_report]
    orchestrator: lx-oma (optional)
    description: 蜂群协调层 — 状态跟踪+冲突协调

  - id: lx-oracle
    version: v2.0.0
    type: quality-gate
    consumes: [task_evidence, executor_logs, token_files]
    provides: [oracle_verdicts, gate_decisions]
    description: Oracle quality gate system — static (Oracle-D), runtime (Oracle-V), dual-agent review (Duo)

# ─── 数据契约 ───
# 各 skill 之间交换的数据格式约定
contracts:
  - from: lx-oma (hier)
    to: lx-oma (split)
    artifact: sub-prds/domain-{id}.md
    schema: Sub PRD 模板（边界/接口/非功能/Mock/数据实体/依赖/AC）
  - from: lx-oma (split)
    to: lx-oma (gov)
    artifact: prd/{sub_prd}/feat-{id}/prd.md
    schema: feature PRD 模板
  - from: lx-oma (gov)
    to: lx-oma (orch)
    artifact: .omc/state/gov-latest-report.yaml
    schema: gov_report.yaml
  - from: lx-oma (orch)
    to: all
    artifact: state/pipeline.yaml
    schema: pipeline 状态机 YAML

# ─── 隐式依赖: Hook 门禁 → Skill ───
# 这些依赖是通过运行时 hook 系统注入的，skill 本身不显式引用，
# 但执行时必须有对应的 hook 门禁支持。
hook_gates:
  - gate: pretool_plan_gate
    protects: [lx-goal, lx-rpe, lx-ghost]
    description: Plan-before-Execute 门禁，阻断未审批的代码变更
  - gate: permission_gate
    protects: [lx-goal, lx-ghost, lx-rpe]
    description: 危险命令拦截 + CAPTCHA 文件保护，自主执行安全网
  - gate: pretool_oracle_gate
    protects: [lx-ghost]
    description: Oracle 审核前置门禁
  - gate: pre_ask_guard
    protects: [lx-goal, lx-ghost]
    description: 决策链过滤，减少自主模式下的不必要打断
  - gate: pretool_git_gate
    protects: [lx-git-check]
    description: Git 提交前检查门禁
  - gate: pretool_skill_version_guard
    protects: [lx-validate-skill, lx-skillify]
    description: SKILL.md 版本格式门禁
  - gate: pretool_skill_body_enforce
    protects: [lx-skillify]
    description: Skill body 强制执行合约注入

# ─── 校验规则 ───
validation:
  # 禁止循环依赖：skills[].references 必须形成 DAG
  no_cycles: true
  # 管线阶段必须是有向无环的
  pipeline_acyclic: true
  # 每个 consumed artifact 必须被上游某个 skill 的 provides 覆盖
  artifact_coverage: true
