# harness-kit profile diff: Rust 项目

# philosophy_alignment: [#4 验证优先, #3 先守护 (ownership+borrow checker)]
# v5.3.0: 仅包含与 base/harness.yaml 不同的字段（\~25%）

# 安装：bash .claude/profiles/merge-profile.sh rust

\
project: language: rust source_extensions: "*.rs" cite_extensions: "*.rs *.toml"\
protected_files: warn_on_edit: "Cargo.toml Cargo.lock"\
architecture: business_layers: "*/src/domain/* */src/services/* */src/models/*" handler_layers: "*/src/handlers/* */src/routes/* */src/api/*" quality_checklist: "所有权正确 | 错误用 Result<T,E> | 禁止 unwrap() in lib | 文档注释 | clippy 零警告" handler_constraint: "Handler 禁止直接访问 DB，通过 Repository trait" doc_sync_target: "executor.md"\
knowledge: lsp_hint: "Rust 符号导航（cargo doc / rust-analyzer）" lsp_example_file: "*.rs"\
fuzzy_detection: explicit_target_regex: 'Step\s*[0-9]+|rpe/[a-zA-Z_]+|\.rs$|\.toml$|trait|impl|struct|enum|mod'\
error_dna: build_commands: "cargo build cargo test cargo clippy cargo check"\
