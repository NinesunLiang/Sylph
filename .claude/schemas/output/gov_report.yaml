# gov_report.yaml
# Schema: 治理报告输出契约
# Referenced by: lx-oma-gov §reconcile / §propagate / §audit / §status
# 用途：标准化治理操作的结果输出，供 orchestrator 消费
version: "1.0"
fields:
  session_id:
    type: string
    description: "治理会话 ID"
    required: true
  action:
    type: string
    enum: [reconcile, propagate, audit, status, init]
    description: "执行的治理动作"
    required: true
  result:
    type: string
    enum: [no_changes, success, conflict, error]
    description: "操作结果"
    required: true
  master_source:
    type: string
    description: "主 PRD 源路径"
    optional: true
  changes:
    type: array
    description: "检测到的变更列表"
    items:
      type: object
      properties:
        change_id:
          type: string
          pattern: "CHG-\\d{8}-\\d{3}"
          description: "变更记录 ID"
          required: true
        level:
          type: string
          enum: [L1, L2, L3]
          description: "L1=元数据, L2=可选项, L3=核心需求/决策冲突"
          required: true
        description:
          type: string
          description: "变更描述"
          required: true
        source:
          type: string
          description: "变更来源（master-prd 章节）"
          required: true
        target:
          type: string
          description: "影响目标 feature"
          optional: true
        confidence:
          type: string
          enum: [confirmed, likely, needs_review]
          description: "检测置信度 — E2 幻觉守卫"
          default: confirmed
  conflicts:
    type: array
    description: "L3 冲突列表"
    items:
      type: object
      properties:
        conflict_id:
          type: string
          pattern: "CONFLICT-\\d{3}"
          description: "冲突 ID"
          required: true
        status:
          type: string
          enum: [pending, resolved, rejected, deferred]
          description: "冲突裁决状态"
          required: true
        description:
          type: string
          description: "冲突描述"
          required: true
  feature_states:
    type: array
    description: "各 feature 同步状态"
    items:
      type: object
      properties:
        feature:
          type: string
          description: "Feature 名称"
          required: true
        sync_status:
          type: string
          enum: [up_to_date, behind, unknown]
          description: "与 master PRD 同步状态"
          required: true
        last_sync:
          type: string
          format: date
          optional: true
