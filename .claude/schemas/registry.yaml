# 原子 Schema（被 3+ skill 复用）atomic: scan_target: path: schemas/atomic/scan_target.yaml version: v1 description: "扫描/审查/验证目标定义" consumers: [lx-code-review, lx-security-review, lx-browser-verify, lx-pre-commit, lx-pre-push, lx-perf-analysis, lx-web-perf, lx-react-review, lx-style-guide, lx-golang-test]
 severity: path: schemas/atomic/severity.yaml version: v1 description: "问题严重度分级" consumers: [lx-code-review, lx-security-review, lx-browser-verify, lx-pre-push, lx-todo]
 finding: path: schemas/atomic/finding.yaml version: v1 description: "单个问题/发现项" consumers: [lx-code-review, lx-security-review, lx-browser-verify, lx-pre-commit, lx-pre-push, lx-perf-analysis, lx-web-perf, lx-react-review, lx-style-guide, lx-golang-test]
 scan_report: path: schemas/atomic/scan_report.yaml version: v1 description: "扫描/审查/验证报告" consumers: [lx-code-review, lx-security-review, lx-browser-verify, lx-pre-commit, lx-pre-push, lx-perf-analysis, lx-web-perf, lx-react-review, lx-style-guide, lx-golang-test]
 gate_result: path: schemas/atomic/gate_result.yaml version: v1 description: "Gate 判定结果" consumers: [lx-pre-commit, lx-pre-push, lx-security-review]
 context_summary: path: schemas/atomic/context_summary.yaml version: v1 description: "上下文收集摘要" consumers: [lx-tdd-spec, lx-browser-verify, lx-debug-spec, lx-root-cause-analysis]
 fix_record: path: schemas/atomic/fix_record.yaml version: v1 description: "修复记录" consumers: [lx-code-review, lx-security-review, lx-todo, lx-debug-spec, lx-react-review, lx-style-guide, lx-web-perf, lx-frontend-test, lx-golang-test, lx-perf-analysis]
 verdict: path: schemas/atomic/verdict.yaml version: v1 description: "最终判定" consumers: [ALL]
