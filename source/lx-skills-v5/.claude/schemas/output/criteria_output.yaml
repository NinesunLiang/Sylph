# criteria_output.yaml
# Schema: 验收标准输出契约
# Referenced by: lx-tdd-spec Step 4
version: "1.0"
fields:
  feature_id:
    type: string
    description: "特性/功能标识"
    required: true
  criteria:
    type: array
    items:
      type: object
      properties:
        id:
          type: string
          pattern: "AC-\\d{3}"
        description:
          type: string
        gwt:
          type: object
          properties:
            given:
              type: string
            when:
              type: string
            then:
              type: string
        priority:
          type: string
          enum: [P0, P1, P2]
        testability:
          type: string
          enum: [automatable, manual, not_testable]
  assertability_check:
    type: object
    properties:
      passed:
        type: boolean
      rejections:
        type: array
        items:
          type: string
