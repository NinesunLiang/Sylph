# Schema: verdict

# Version: v1

# Owner: harness-kit (shared)

# Description: 最终判定，被 14 个 skill 全部复用

# Consumers: ALL lx-* skills

status:
  type: enum
  values: [pass, blocked, warn, incomplete]
  required: true
  description: "判定状态"
summary:
  type: string
  required: true
  description: "判定摘要"
next_actions:
  type: array
  required: false
  items:
    type: object
    description: "建议的下一步动作"
    properties:
      action:
        type: string
      priority:
        type: enum
        values: [p0, p1, p2, p3]
evidence_summary:
  type: string
  required: true
  description: "证据摘要"
