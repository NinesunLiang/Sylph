# Schema: gate_result

# Version: v1

# Owner: harness-kit (shared)

# Description: Gate 判定结果，被 3+ skill 复用

# Consumers: lx-pre-commit, lx-pre-push, lx-security-review

gate_name:
  type: string
  required: true
  description: "Gate 名称"
  example: "Test Gate"
passed:
  type: boolean
  required: true
  description: "是否通过"
blockers:
  type: array
  required: false
  items:
    type: ref
    target: finding.yaml
  description: "阻塞项（导致不通过的问题）"
warnings:
  type: array
  required: false
  items:
    type: ref
    target: finding.yaml
  description: "警告项（不阻塞但需注意）"
verdict:
  type: enum
  values: [pass, blocked, warn]
  required: true
  description: "Gate 判定"
