# Schema: task_input

# Version: v1

# Owner: lx-task-spec

# Description: 结构化任务输入，所有 task-driven skill 的通用入口

task_name:
  type: string
  required: true
  description: "任务简短标识（kebab-case）"
  example: "add-login-api"
target:
  type: string
  required: true
  description: "任务目标描述"
  example: "新增登录接口，支持手机号+验证码"
pass_criteria:
  type: array
  required: true
  min_items: 1
  description: "验收标准清单"
  items:
    type: object
    properties:
      id:
        type: string
        required: true
        pattern: "^AC-\\d+$"
      type:
        type: enum
        values: [test, build, behavior, perf, security, doc]
        required: true
      description:
        type: string
        required: true
      how_to_check:
        type: string
        required: true
        description: "验证命令/操作"
      expected:
        type: string
        required: true
        description: "期望现象"
priority:
  type: enum
  values: [p0, p1, p2]
  required: true
  default: p1
repo_root:
  type: string
  required: false
  default: "."
  description: "仓库根目录路径"
