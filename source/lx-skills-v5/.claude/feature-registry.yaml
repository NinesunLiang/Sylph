  type: hook
  category: observability
  description: 飞轮报告 — SessionStart 输出 P0 告警摘要
  enabled_by_default: true
  evidence_level: L3
- name: fuzzy_block
  type: hook
  category: quality
  description: 模糊指令阻断 — 检测模糊动词+无明确目标时硬阻断
  enabled_by_default: true
  evidence_level: L3
- name: inject_project_knowledge
  type: hook
  category: knowledge
  description: 知识注入 — SessionStart 注入核心治理文件摘要
  enabled_by_default: true
  evidence_level: L3
- name: knowledge_condenser
  type: hook
  category: knowledge
