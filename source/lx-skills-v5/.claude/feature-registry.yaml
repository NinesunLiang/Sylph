skills:
- name: lx-status
  type: monitor
  category: observability
  description: 健康面板：执行效率、自愈力和渐进式披露 Token 节省
  enabled_by_default: true
- name: lx-code-review
  type: reviewer
  category: review
  description: 通用代码审查：8 类别 39 规则，含错误处理/并发安全/接口设计/性能。方法论文本通用，当前实现含 Go 特定规则
  enabled_by_default: true
- name: lx-test-gen
  type: tester
  category: test
  description: 语言无关通用测试生成：自动检测语言(Go/TS/Python/Rust/Java/Ruby)，路由到参数化/Mock/HTTP/benchmark/fuzz/race
    模式
  enabled_by_default: true
- name: lx-varlock
  type: guard
  category: security
  description: 隐私脱敏代理管理器：密码/API Key/Token 明文保护
  enabled_by_default: true
- name: lx-todo
  type: workflow
  category: workflow
  description: 轻量 TODO 工作流：capture/triage/fix/verify/close 5步循环
  enabled_by_default: true
- name: lx-task-spec
  type: workflow
  category: workflow
  description: 任务驱动机制：引导问答 x3 → 结构化输入 → 规划 → 执行 → 验收
  enabled_by_default: true
- name: lx-pre-commit
  type: gate
  category: workflow
  description: 提交前质量门禁：类型检测 → 编译 → 测试 → 代码审查
  enabled_by_default: true
- name: lx-pre-push
  type: gate
  category: workflow
  description: 推送前深度门禁：commit message 校验 → 测试覆盖 → 安全扫描
  enabled_by_default: true
- name: lx-rpe
  type: workflow
  category: workflow
  description: RPE 特性开发循环：TDD/代码审查/安全/验收/分级回滚
  enabled_by_default: true
- name: lx-validate-skill
  type: reviewer
  category: quality
  description: Skill 验收：frontmatter/原子化声明/节点引用/11 项规则检查
  enabled_by_default: true
- name: lx-root-cause-analysis
  type: analyzer
  category: debug
  description: 根因分析：Five Whys/证据链/置信度评分/免疫防御
  enabled_by_default: true
- name: lx-race
  type: orchestrator
  category: infrastructure
  description: 蜂群协调层 — 快速并行处理简单同构任务。注册子任务 → 派发多 agent → 收集 → 报告。基础机制，非可选 skill。
  enabled_by_default: true
- name: lx-stepwise
  type: orchestrator
  category: infrastructure
  description: 逐步攻坚模式 — 高难度 bug 单步推进（隔离→定位→方案→修复→加固），每步验证。与 lx-race 互补。
  enabled_by_default: true
- name: lx-goal
  type: workflow
  category: automation
  description: 目标模式 — 目标驱动自主执行。给 AI 具体目标，自动执行到完并输出报告。
  enabled_by_default: true
- name: lx-ghost
  type: workflow
  category: automation
  description: 幽灵模式 — 方向驱动自主探索。给 AI 方向，AI 自主探索修复，不干扰人。
  enabled_by_default: true
- name: lx-oma-hier
  type: orchestrator
  category: workflow
  description: 分层 PRD 拆解：将超大型 PRD 按功能域 MECE 拆分为多个 Sub PRD
  enabled_by_default: true
- name: lx-oma-split
  type: orchestrator
  category: workflow
  description: 一人成军司令部：Sub PRD 拆解为 feature 级 RPE，MECE 正交
  enabled_by_default: true
- name: lx-oma-gov
  type: orchestrator
  category: workflow
  description: PRD 治理：漂移检测、冲突裁决、增量同步
  enabled_by_default: true
- name: lx-oma-orch
  type: orchestrator
  category: workflow
  description: 管线编排器：状态查看/阶段推进/Oracle 门禁/并行开发管理
  enabled_by_default: true
- name: lx-sync
  type: reviewer
  category: quality
  description: 变更后一致性检查：frontmatter↔registry 漂移、source mirror 同步、harness_version 对齐、重复
    key、引用完整性
  enabled_by_default: true
- name: update-carror-os
  type: workflow
  category: workflow
  description: Carror OS 安装/更新：备份 AGENTS.md → 安装 → 恢复 → 验证 4 步闭环
  enabled_by_default: true
- name: lx-skillify
  type: workflow
  category: automation
  description: Skill 自动生成器 — 6 阶段管道：澄清→分析→生成→支撑文件→验证→注册
  enabled_by_default: true
- name: lx-learner
  type: workflow
  category: automation
  description: 技能学习者 — 从对话模式检测、提议并提取可重用 lx-* skill，附带来源文档
  enabled_by_default: true
- name: lx-dogfood
  type: workflow
  category: workflow
  description: 主动投喂狗粮 — 事故发生时趁热记录，处理完毕时提炼教训，让 Carror OS 越用越聪明
  enabled_by_default: true
  evidence_level: L3
