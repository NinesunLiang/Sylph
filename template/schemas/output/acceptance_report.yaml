# acceptance_report.yaml
# Schema: todo 项关闭时的验收报告格式
# Referenced by: lx-todo Step 4
version: "1.0"
fields:
  todo_id:
    type: string
    description: "Todo 项 ID"
    required: true
  status:
    type: string
    enum: [closed, rejected, deferred]
    required: true
  evidence:
    type: array
    items:
      type: object
      properties:
        type:
          type: string
          enum: [test_pass, build_pass, manual_verify, log_confirm]
        description:
          type: string
        file_ref:
          type: string
          optional: true
  closure_note:
    type: string
    description: "关闭说明（why this is resolved）"
    required: true
  verified_at:
    type: string
    format: date-time
    required: true
