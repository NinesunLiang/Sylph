app:
  name: CarrorOS
  version: 7.0.0
  environment: production
  debug: false
server:
  host: 0.0.0.0
  port: 8080
  workers: 4
  max_request_size: 10MB
  cors:
    origins:
    - https://app.carroros.dev
    methods:
    - GET
    - POST
    - PUT
    - DELETE
features:
  oracle: true
  meta_oracle: false
  compact_defense: true
  rate_limit: 100
database:
  url: postgresql://prod-primary.carroros.internal:5432/carroros
  pool:
    min: 5
    max: 20
    timeout: 30
  ssl:
    enable: true
    ca_cert: /etc/certs/ca.pem
    cert: /etc/certs/client.pem
    key: /etc/certs/client.key
cache:
  backend: redis
  url: redis://localhost:6379/0
  ttl: 3600
logging:
  level: info
  format: json
  output: /var/log/carroros/app.log
_meta:
  generated_at: '2026-07-06'
  sources:
  - db_config.yaml
  - app_config.yaml
  version: 7.0.0
