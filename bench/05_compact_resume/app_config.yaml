# Application Configuration
app:
  name: "CarrorOS"
  version: "7.0.0"
  environment: "production"
  debug: false

server:
  host: "0.0.0.0"
  port: 8080
  workers: 4
  max_request_size: "10MB"
  cors:
    origins:
      - "https://app.carroros.dev"
    methods:
      - GET
      - POST
      - PUT
      - DELETE

features:
  oracle: true
  meta_oracle: false
  compact_defense: true
  rate_limit: 100
